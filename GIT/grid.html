<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        background-color: aqua;
        }

        div {
            background-color: rgba(0, 140, 255, 0.913);
            margin: 20px;
            padding: 20px;
            color: aliceblue;
            font-size: large;
            border-radius: 10px;
            border: 2px solid white;
        }

    </style>
</head>
<body>
    <h1>Grid Display:</h1>

    <div class="container">
        <div>item1</div>
        <div>item2</div>
        <div>item3</div>
        <div>item4</div>
        <div>item5</div>
    </div>


    
    
</body>
</html>
