<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>API Calling</h1>

    <button onclick="loadData">Load data</button>
    <div class="output"></div>
</body>

<script>
    async function loadData() {
        const output = document.getElementById('output');
        output.innerHTML="Loading...";

        const userAPI = fetch("https://jsonplaceholder.typicode.com/users/1")
            .then(res => res.json());

        const postAPI = fetch("https://jsonplaceholder.typicode.com/postss/1")
            .then(res => res.json());

        const commentAPI = fetch("https://jsonplaceholder.typicode.com/comments/1")
            .then(res => res.json());

    Promise.allSettled ([userAPI,postAPI,commentAPI])
    } 
</script>

</html>
