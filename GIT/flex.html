<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container1 {
            display: flex;
            background-color: aqua;
        }
        .container2 {
            display: flex;
            background-color: aqua;
            flex-direction: row-reverse;
        }
        .container3 {
            display: flex;
            background-color: aqua;
            flex-direction: column;
        }
        .container4 {
            display: flex;
            background-color: aqua;
            flex-direction: column-reverse;
        }

        
        div {
            background-color: rgba(0, 140, 255, 0.913);
            margin: 20px;
            padding: 20px;
            color: aliceblue;
            font-size: large;
            border-radius: 10px;
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <h1>Flexbox example</h1>

    <div class="container1">
        <div>item1</div>
        <div>item2</div>
        <div>item3</div>
        <div>item4</div>
        <div>item5</div>
    </div>

    <div class="container2">
        <div>item1</div>
        <div>item2</div>
        <div>item3</div>
        <div>item4</div>
        <div>item5</div>
    </div>

    <div class="container3">
        <div>item1</div>
        <div>item2</div>
        <div>item3</div>
        <div>item4</div>
        <div>item5</div>
    </div>

    <div class="container4">
        <div>item1</div>
        <div>item2</div>
        <div>item3</div>
        <div>item4</div>
        <div>item5</div>
    </div>

</body>
</html>
