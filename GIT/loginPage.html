<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <style>
        body {
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .main-card {
            background-color: #1f1d2b;
            border-radius: 20px;
            overflow: hidden;
            max-width: 960px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            min-height: 580px;
            border-radius: 16px;
        }
        
        .img-container {
            padding: 12px;
        }

        .form-container {
            padding: 3.5rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-container h1 {
            font-size: 2.2rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-container p, .form-container label {
            color: #a5a3b4;
            font-size: 0.9rem;
        }

        .form-container a {
            color: #a5a3b4;
            text-decoration: underline;
        }

        .name-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-container input[type="text"],
        .form-container input[type="email"],
        .form-container input[type="password"] {
            background-color: #2d2b3d;
            border: 1px solid #3d3b50;
            border-radius: 8px;
            color: white;
            padding: 12px 16px;
            width: 100%;
            outline: none;
            box-sizing: border-box;
        }
        
        .form-container input::placeholder {
            color: #636179;
        }

        .form-container input:focus {
            border-color: #7966e3;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
        }

        .checkbox-container input {
            width: 16px;
            height: 16px;
            accent-color: #7966e3;
        }

        .btn-create {
            background-color: #7966e3;
            border: none;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .btn-create:hover {
            background-color: #6552cf;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #636179;
            font-size: 0.8rem;
            margin-bottom: 24px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #3d3b50;
        }


        .social-row {
            display: flex;
            gap: 12px;
        }

        .btn-social {
            flex: 1;
            background-color: transparent;
            border: 1px solid #3d3b50;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

    </style>
</head>
<body>

    <div class="main-card">
        <div class="row g-0">
            <div class="col-md-6 img-container d-none d-md-block">
                <img src="https://imgs.search.brave.com/PKpnMCK4xY2Eo2rn05aeU1mtDh_PkJSeB97QNAgs5NM/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9tZWRp/YS5pc3RvY2twaG90/by5jb20vaWQvMTM1/NjU2NTI3NC9waG90/by9tb2Rlcm4tYWJz/dHJhY3Qtd2F2eS1i/YWNrZ3JvdW5kLmpw/Zz9zPTYxMng2MTIm/dz0wJms9MjAmYz1O/bzY3SUFmMEIxUDZU/SHhQaVUyekk5elBW/cDZKNndFdWZfOHpF/czNpSEt3PQ" alt="Promo Graphic">
            </div>

            <div class="col-12 col-md-6 form-container">
                <form>
                    <h1>Create an account</h1>
                    <p>Already have an account? <a href="#">Log in</a></p>
                    
                    <div class="name-row">
                        <input type="text" placeholder="First name">
                        <input type="text" placeholder="Last name">
                    </div>
                    
                    <div class="mb-3">
                        <input type="email" placeholder="Email">
                    </div>
                    
                    <div class="mb-3">
                        <input type="password" placeholder="Enter your password">
                    </div>
                    
                    <div class="checkbox-container">
                        <input type="checkbox" id="check">
                        <label for="check">I agree to the <a href="#">Terms & Conditions</a></label>
                    </div>

                    <button type="button" class="btn-create">Create account</button>

                    <div class="divider">Or register with</div>

                    <div class="social-row">
                        <button type="button" class="btn-social google">
                            <img src="https://www.google.com/favicon.ico" width="16" height="16" alt=""> Google
                        </button>
                        <button type="button" class="btn-social apple">
                            <img src="https://apple.com/favicon.ico" width="16" height="16" alt=""> Apple
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
</body>
</html>
