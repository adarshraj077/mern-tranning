<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --primary: rgb(162, 149, 149);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            margin: 0;
            font-family: sans-serif;
        }
        
        .profile-card {
            width: 300px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 3px 2px 10px rgba(0, 0, 0, 0.71);
            background-color: rgb(57, 51, 51);
            border: 1px solid rgba(255, 255, 255, 0.591);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            align-items: center;
            box-sizing: border-box;
        }

        img {
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h2 {
            color: var(--primary);
            margin: 0;
        }

        .profile-card:hover {
            transform: scale(1.02);
        }

        @media (max-width: 480px) {
            .profile-card {
                width: 100%;
            }
        }

    </style>
</head>
<body>
    <article class="profile-card">
        <img src="https://imgs.search.brave.com/yqIUqZFMuLBhlBVEjWnQMIUkDmFddnm_kSDa_TfiQ-g/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9tZWRp/YS5nZXR0eWltYWdl/cy5jb20vaWQvMTk2/NTA3NDkyOS9waG90/by9saWdodC10aGUt/c3RhcnJ5LXNreS5q/cGc_cz02MTJ4NjEy/Jnc9MCZrPTIwJmM9/UXR3UWJVcGh2VnJk/U05ER0hQTm1ESE9z/Y0NEeFh6YXNUd3N3/U1NMYUxHYz0" alt="" width="100px" height="100px">
        <h2>
            Himanshu 
        </h2>
    </article>
</body>
</html>
