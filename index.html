<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex</title>
    <style>
        .row {
            display: flex;
            color: blue;
        }

        .rowreverse {
            display: flex;
            flex-direction: row-reverse;

        }

        .columnreverse {
            display: flex;
            flex-direction: column-reverse;
        }

        div {
            background-color: rgba(4, 46, 35, 0.687);
            margin: 20px;
            padding: 20px;
            color: rgb(13, 137, 245);
            font-size: large;
            border-radius: 10px;
            border: 2px solid rgb(6, 159, 255);
        }
    </style>
</head>

<body>
    <h1> Flex example </h1>
    <div class="row ">
        <div>item1</div>
        <div>item2</div>
        <div>item3</div>
        <div>item4</div>
    </div>
    <div class="rowreverse ">
        <div>item1</div>
        <div>item2</div>
        <div>item3</div>
        <div>item4</div>
    </div>
    <div class="column ">
        <div>item1</div>
        <div>item2</div>
        <div>item3</div>
        <div>item4</div>
    </div>
    </div>
    <div class="columnreverse ">
        <div>item1</div>
        <div>item2</div>
        <div>item3</div>
        <div>item4</div>
    </div>


</body>

</html>
